<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Squid Game Landing Page</title>

  <!-- Remix Icon -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css"
  />

  <!-- External CSS -->
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">

    <!-- Navbar -->
    <nav class="navbar">
      <div class="logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/7/7a/Squid_Game_logo.png" alt="">
      </div>

      <ul class="nav-links">
        <li><a href="#">About</a></li>
        <li><a class="active" href="#">Watch now</a></li>
        <li><a href="#">Actors</a></li>
        <li><a href="#">Contact</a></li>
      </ul>

      <div class="menu">
        <i class="ri-menu-line"></i>
      </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">

      <!-- Left Content -->
      <div class="left-content">

        <img
          class="main-logo"
          src="./squid_game_PNG35.png"
          alt=""
        >

        <p class="description">
          Action / Thriller / Drama Series directed by Dong-hyuk Hwang
          <br>
          Season 1: 9 Episodes
        </p>

        <div class="buttons">

          <button class="play-btn">
            <i class="ri-play-circle-fill"></i>
            Play Now
          </button>

          <button class="trailer-btn">
            <i class="ri-play-line"></i>
            Watch Trailer
          </button>

        </div>

      </div>

      <!-- Scroll Text -->
      <div class="scroll-text">
        <span>SCROLL</span>
      </div>

      <!-- Right Image -->
      <div class="right-content">

        <img
          class="guard-img"
          src="./Untitled.png"
          alt=""
        >

        <div class="social-icons">
          <i class="ri-twitter-x-line"></i>
          <i class="ri-instagram-line"></i>
          <i class="ri-facebook-circle-line"></i>
        </div>

      </div>

    </section>

    <!-- Bottom Cards -->
    <section class="cards">

      <div class="card">
        <img
          src="./e55DD3j.jpg"
          alt="not found"
        >
        <div class="play-icon">
          <i class="ri-play-fill"></i>
        </div>
      </div>

      <div class="card">
        <img
          src="./original-fd7df221c44481dbc8dbe9e751d5c2fb.webp"
          alt=""
        >
        <div class="play-icon">
          <i class="ri-play-fill"></i>
        </div>
      </div>

      <div class="card">
        <img
          src="./images.jpg"
          alt=""
        >
        <div class="play-icon">
          <i class="ri-play-fill"></i>
        </div>
      </div>

    </section>

  </div>

</body>
</html>
